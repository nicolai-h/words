<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>日本語 Flashcards</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>日本語</h1>
    <div class="controls">
      <select id="level-select" aria-label="JLPT level">
        <option value="N5">N5</option>
        <option value="N4">N4</option>
        <option value="ALL">N5 + N4</option>
      </select>
      <button id="shuffle-btn" type="button" aria-label="Shuffle deck">⇄</button>
    </div>
  </header>

  <main>
    <div class="progress" id="progress">0 / 0</div>

    <div class="card" id="card" role="button" tabindex="0" aria-label="Flip card">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="word" id="word"></div>
          <div class="hint">tap to flip</div>
        </div>
        <div class="card-face card-back">
          <div class="english" id="english"></div>
          <div class="hint">tap to flip</div>
        </div>
      </div>
    </div>

    <div class="nav">
      <button id="prev-btn" type="button">← Prev</button>
      <button id="next-btn" type="button">Next →</button>
    </div>
  </main>

  <script src="vocab.js"></script>
  <script src="app.js"></script>
</body>
</html>
